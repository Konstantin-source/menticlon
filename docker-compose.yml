version: '3.8'

services:
  # PostgreSQL Service for persistent storage
  postgres:
    image: postgres:15-alpine
    container_name: vibepoll_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibepoll_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-choose_a_strong_database_password}
      POSTGRES_DB: ${POSTGRES_DB:-vibepoll}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibepoll_admin} -d ${POSTGRES_DB:-vibepoll}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Service for in-memory live vote caching & queuing
  redis:
    image: redis:7-alpine
    container_name: vibepoll_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-choose_a_strong_redis_password}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-choose_a_strong_redis_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Node.js Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibepoll_backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DB_USER: ${POSTGRES_USER:-vibepoll_admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-choose_a_strong_database_password}
      DB_NAME: ${POSTGRES_DB:-vibepoll}
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-choose_a_strong_redis_password}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Frontend Service (Served via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://menti.konstihome.de}
        VITE_WS_URL: ${VITE_WS_URL:-wss://menti.konstihome.de}
    container_name: vibepoll_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - default
      - web-services
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.menticlon.rule=Host(`menti.konstihome.de`)"
      - "traefik.http.routers.menticlon.entrypoints=websecure"
      - "traefik.http.routers.menticlon.tls=true"
      - "traefik.http.services.menticlon.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Cloudflared Tunnel Service for secure external access
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vibepoll_cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: menticlon_internal
  web-services:
    external: true

volumes:
  postgres_data:
    driver: local

